<form [formGroup]="userForm">
  <ng-container formGroupName="contactInfos">
    <ng-container formArrayName="addressList">
      <ng-container
        *ngFor="let address of addressList.controls; let i = index"
        [formGroupName]="i"
      >
        <div class="my-4 grid sm:grid-cols-2 gap-4">
          <mat-form-field class="w-full">
            <mat-label>Tipo:</mat-label>
            <input matInput formControlName="typeDescription" />
          </mat-form-field>
          <mat-form-field class="w-full">
            <mat-label>Rua:</mat-label>
            <input matInput formControlName="street" />
            <mat-error>A rua é obrigatória</mat-error>
          </mat-form-field>
          <mat-form-field class="w-full">
            <mat-label>Complemento:</mat-label>
            <input matInput formControlName="complement" />
          </mat-form-field>
          <mat-form-field class="w-full">
            <mat-label>País:</mat-label>
            <input matInput formControlName="country" />
            <mat-error>O país é obrigatório</mat-error>
          </mat-form-field>
          <mat-form-field class="w-full">
            <mat-label>Estado:</mat-label>
            <input matInput formControlName="state" />
            <mat-error>O estado é obrigatório</mat-error>
          </mat-form-field>
          <mat-form-field class="w-full">
            <mat-label>Cidade:</mat-label>
            <input matInput formControlName="city" />
            <mat-error>A cidade é obrigatória</mat-error>
          </mat-form-field>
        </div>
        <hr class="block lg:hidden" />
      </ng-container>
    </ng-container>
  </ng-container>
</form>
