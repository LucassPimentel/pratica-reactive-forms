<form class="grid lg:grid-cols-3 gap-4" [formGroup]="userForm">
  <ng-container formGroupName="contactInfos">
    <ng-container formArrayName="phoneList">
      <mat-form-field
        class="w-full"
        *ngFor="let phone of phoneList.controls; let i = index"
        [formGroupName]="i"
      >
        <mat-label>{{ phoneList.value[i].typeDescription }}:</mat-label>
        <input
          matInput
          [placeholder]="phoneList.value[i].type | phonePlaceholder"
          [mask]="phoneList.value[i].type | phoneMask"
          formControlName="phoneNumber"
        />
        <mat-error *ngIf="phone.get('phoneNumber')?.hasError('required')"
          >O Telefone é obrigatório</mat-error
        >
        <mat-error
          *ngIf="
            !phone.get('phoneNumber')?.hasError('required') &&
            phone.get('phoneNumber')?.hasError('mask')
          "
          >O Telefone é inválido</mat-error
        >
      </mat-form-field>
    </ng-container>
  </ng-container>
</form>
