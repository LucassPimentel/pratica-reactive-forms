<mat-tab-group [(selectedIndex)]="currentTabIndex">
  <mat-tab label="Geral">
    <ng-template mat-tab-label>
      Geral
      <mat-icon
        *ngIf="isInEditMode && !generalInfosValid"
        class="red-circle-icon"
        color="warn"
        >circle</mat-icon
      >
    </ng-template>
    <app-general-infos
      *ngIf="!isInEditMode"
      [user]="userSelected"
    ></app-general-infos>
    <app-general-infos-edit
      *ngIf="isInEditMode"
      [userForm]="userForm"
      [countriesList]="countriesList"
      [statesList]="statesList"
      (onCountrySelected)="onCountrySelected($event)"
    ></app-general-infos-edit>
  </mat-tab>
  <mat-tab label="Contato">
    <ng-template mat-tab-label>
      Contatos
      <mat-icon
        *ngIf="isInEditMode && !contactInfosValid"
        class="red-circle-icon"
        color="warn"
        >circle</mat-icon
      >
    </ng-template>
    <app-contact-infos
      *ngIf="!isInEditMode"
      [user]="userSelected"
    ></app-contact-infos>
    <app-contact-infos-edit
      *ngIf="isInEditMode"
      [userForm]="userForm"
    ></app-contact-infos-edit>
  </mat-tab>
  <mat-tab label="Dependente">
     <ng-template mat-tab-label>
      Dependentes
      <mat-icon
        *ngIf="isInEditMode && !dependentInfosValid"
        class="red-circle-icon"
        color="warn"
        >circle</mat-icon
      >
    </ng-template>
    <app-dependents-list
      *ngIf="!isInEditMode"
      [dependents]="userSelected.dependentsList"
    ></app-dependents-list>
    <app-dependents-list-edit
      *ngIf="isInEditMode"
      [userForm]="userForm"
      (onRemoveDependent)="removeDependent($event)"
      (onAddDependent)="addDependent()"
    ></app-dependents-list-edit>
  </mat-tab>
</mat-tab-group>
<p>UserForm Valid: {{ userForm.valid }}</p>
<p>GeneralInfos Group Valid: {{ userForm.get("generalInfos")?.valid }}</p>
<button
  class="rounded-md px-3 py-2 text-lg font-medium leading-5 text-white bg-indigo-600 hover:bg-indigo-500"
  (click)="mostrarUserFormValue()"
>
  Mostrar valor do formulário
</button>
